<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friend Chat</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💬</text></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- Setup screen -->
    <div class="setup" id="setup">
      <div class="setup-card">
        <h2>👋 欢迎来到 Friend Chat</h2>
        <p>请选择头像、输入昵称，开始和朋友聊天。</p>
        <div class="avatar-picker" id="avatarPicker"></div>
        <input type="hidden" id="avatarInput" value="🐱" />
        <input type="text" id="nameInput" placeholder="你的昵称" maxlength="16" />
        <button id="startBtn">进入聊天室</button>
        <div class="setup-hint" id="setupHint"></div>
      </div>
    </div>

    <!-- Chat screen -->
    <div class="chat" id="chat" hidden>
      <header class="chat-header">
        <div class="avatar" id="friendAvatar">🧸</div>
        <div class="header-info">
          <h1 id="chatTitle">朋友</h1>
          <span class="status" id="status">在线</span>
        </div>
        <button class="notify-btn" id="notifyBtn" title="开启消息通知">🔔</button>
      </header>

      <main class="chat-main" id="chatMain">
        <div class="messages" id="messages">
          <div class="system-msg">欢迎来到你们的专属聊天室 💬</div>
        </div>
        <div class="typing" id="typing" hidden>
          <span></span><span></span><span></span>
        </div>
      </main>

      <div class="notice-banner" id="noticeBanner" hidden>
        <span>📢 桌面通知未开启，新消息可能无法提醒。</span>
        <button id="enableNotifyBtn">去开启</button>
      </div>

      <footer class="chat-footer">
        <div class="input-preview" id="imagePreview" hidden>
          <img id="previewImg" src="" alt="预览" />
          <button class="preview-remove" id="removePreview" title="移除">✕</button>
        </div>
        <div class="input-area">
          <button class="emoji-btn" id="emojiBtn" title="表情">😊</button>
          <label class="image-btn" id="imageBtn" title="发送图片">
            📷
            <input type="file" id="imageInput" accept="image/*" hidden />
          </label>
          <input
            type="text"
            id="messageInput"
            placeholder="输入消息..."
            autocomplete="off"
          />
          <button class="send-btn" id="sendBtn" title="发送">➤</button>
        </div>
        <div class="hint">
          <span class="upload-progress" id="uploadProgress"></span>
          <span>按 Enter 发送 · Shift+Enter 换行 · 支持图文混发</span>
        </div>
      </footer>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
